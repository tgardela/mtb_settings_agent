<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTB Settings Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 680px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .header h2 { color: #111; }
    #chat { height: 420px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .bubble { padding: 10px 14px; border-radius: 8px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; }
    .user { background: #0070f3; color: white; align-self: flex-end; }
    .agent { background: #f0f0f0; color: #333; align-self: flex-start; }
    .typing { color: #aaa; font-style: italic; align-self: flex-start; }
    #controls { display: flex; gap: 8px; }
    #input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    #input:focus { border-color: #0070f3; }
    button { padding: 12px 20px; background: #0070f3; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: default; }
    #header-auth { display: flex; align-items: center; gap: 8px; }
    #login-btn-header { padding: 8px 14px; font-size: 13px; }
    #user-info { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #555; }
    #logout-btn { padding: 8px 14px; font-size: 13px; background: #eee; color: #333; }
    #logout-btn:hover { background: #ddd; }

    /* Modal styles */
    #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
    #modal-overlay.open { display: flex; }
    #modal { background: white; border-radius: 12px; padding: 24px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; position: relative; }
    #modal-close { position: absolute; top: 12px; right: 16px; background: none; color: #666; font-size: 20px; padding: 4px 8px; }
    #modal-close:hover { background: #eee; }
    #auth-tabs { display: flex; gap: 8px; }
    #auth-tabs button { flex: 1; background: #eee; color: #333; }
    #auth-tabs button.active { background: #0070f3; color: white; }
    .auth-form { display: none; flex-direction: column; gap: 8px; }
    .auth-form.visible { display: flex; }
    .auth-form input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    .auth-form input:focus { border-color: #0070f3; }
    #auth-error { color: #e00; font-size: 14px; display: none; }
    #auth-success { color: #080; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🚵 MTB Settings Agent</h2>
      <div id="header-auth">
        <button id="login-btn-header" onclick="openModal()">Login / Sign up</button>
        <div id="user-info" style="display:none;">
          <span id="user-name"></span>
          <button id="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>

    <div id="chat"></div>

    <div id="controls">
      <input id="input" type="text" placeholder="Ask anything..." />
      <button id="btn" onclick="send()">Send</button>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="modal-overlay">
    <div id="modal">
      <button id="modal-close" onclick="closeModal()">✕</button>
      <div id="auth-tabs">
        <button class="active" onclick="showTab('login')">Login</button>
        <button onclick="showTab('signup')">Sign Up</button>
      </div>

      <div id="login-form" class="auth-form visible">
        <input id="login-email" type="email" placeholder="Email" />
        <input id="login-password" type="password" placeholder="Password" />
        <button id="login-submit-btn" onclick="login()">Login</button>
      </div>

      <div id="signup-form" class="auth-form">
        <input id="signup-name" type="text" placeholder="Name" />
        <input id="signup-email" type="email" placeholder="Email" />
        <input id="signup-password" type="password" placeholder="Password" />
        <button id="signup-submit-btn" onclick="signup()">Sign Up</button>
      </div>

      <div id="auth-error"></div>
      <div id="auth-success"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById("input");
    const btn = document.getElementById("btn");
    const chat = document.getElementById("chat");
    const authError = document.getElementById("auth-error");
    const authSuccess = document.getElementById("auth-success");
    const userNameEl = document.getElementById("user-name");
    const loginBtnHeader = document.getElementById("login-btn-header");
    const userInfo = document.getElementById("user-info");
    const modalOverlay = document.getElementById("modal-overlay");

    function getToken() {
      return localStorage.getItem("token");
    }

    function setToken(token) {
      localStorage.setItem("token", token);
    }

    function clearToken() {
      localStorage.removeItem("token");
      localStorage.removeItem("userName");
    }

    function openModal() {
      modalOverlay.classList.add("open");
      authError.style.display = "none";
      authSuccess.style.display = "none";
    }

    function closeModal() {
      modalOverlay.classList.remove("open");
    }

    modalOverlay.addEventListener("click", function(e) {
      if (e.target === modalOverlay) closeModal();
    });

    function showLoggedIn(name) {
      loginBtnHeader.style.display = "none";
      userInfo.style.display = "flex";
      userNameEl.textContent = "Hi, " + name;
    }

    function showGuest() {
      loginBtnHeader.style.display = "";
      userInfo.style.display = "none";
    }

    function showTab(tab) {
      document.getElementById("login-form").classList.toggle("visible", tab === "login");
      document.getElementById("signup-form").classList.toggle("visible", tab === "signup");
      document.querySelectorAll("#auth-tabs button").forEach((b, i) => {
        b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
      });
      authError.style.display = "none";
      authSuccess.style.display = "none";
    }

    async function login() {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value.trim();
      const submitBtn = document.getElementById("login-submit-btn");

      authError.style.display = "none";
      authSuccess.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "Logging in...";

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || "Login failed");
          return;
        }

        if (!data.access_token) {
          showError("No token received from server");
          return;
        }

        setToken(data.access_token);

        const meRes = await fetch("/auth/me", {
          headers: { "Authorization": "Bearer " + data.access_token }
        });
        const meData = await meRes.json();

        localStorage.setItem("userName", meData.name);
        showLoggedIn(meData.name);
        closeModal();
        addBubble("Welcome back, " + meData.name + "! Your conversations are now being saved.", "agent");

      } catch (err) {
        showError("Network error: " + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Login";
      }
    }

    async function signup() {
      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const submitBtn = document.getElementById("signup-submit-btn");

      authError.style.display = "none";
      authSuccess.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account...";

      try {
        const res = await fetch("/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        if (!res.ok) {
          const data = await res.json();
          if (res.status === 409 || (data.detail && data.detail.toLowerCase().includes("exist"))) {
            showError("This email is already registered");
          } else {
            showError(data.detail || "Signup failed");
          }
          return;
        }

        showSuccess("Account created! Logging you in...");
        const loginRes = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        if (!loginRes.ok) {
          showError("Account created but login failed. Please log in manually.");
          showTab("login");
          document.getElementById("login-email").value = email;
          return;
        }

        const loginData = await loginRes.json();
        setToken(loginData.access_token);

        const meRes = await fetch("/auth/me", {
          headers: { "Authorization": "Bearer " + loginData.access_token }
        });
        const meData = await meRes.json();

        localStorage.setItem("userName", meData.name);
        showLoggedIn(meData.name);
        closeModal();
        addBubble("Welcome, " + meData.name + "! Your conversations are now being saved.", "agent");

      } catch (err) {
        showError("Something went wrong, please try again");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign Up";
      }
    }

    function logout() {
      clearToken();
      showGuest();
      addBubble("You've been logged out. Chat continues in guest mode.", "agent");
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
      authSuccess.style.display = "none";
    }

    function showSuccess(msg) {
      authSuccess.textContent = msg;
      authSuccess.style.display = "block";
      authError.style.display = "none";
    }

    input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;

      addBubble(msg, "user");
      input.value = "";
      btn.disabled = true;

      const typing = addBubble("Thinking...", "typing");

      try {
        const token = getToken();
        const headers = { "Content-Type": "application/json" };
        if (token) {
          headers["Authorization"] = "Bearer " + token;
        }

        const res = await fetch("/chat", {
          method: "POST",
          headers,
          body: JSON.stringify({ message: msg })
        });

        const data = await res.json();
        typing.remove();
        addBubble(data.response, "agent");
      } catch (err) {
        typing.remove();
        addBubble("Error: " + err.message, "agent");
      }

      btn.disabled = false;
      input.focus();
    }

    function addBubble(text, type) {
      const div = document.createElement("div");
      div.className = `bubble ${type}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const token = getToken();
      if (token) {
        fetch("/auth/me", { headers: { "Authorization": "Bearer " + token } })
          .then(res => {
            if (!res.ok) { clearToken(); showGuest(); return; }
            return res.json();
          })
          .then(user => {
            if (user) {
              localStorage.setItem("userName", user.name);
              showLoggedIn(user.name);
            }
          })
          .catch(() => { clearToken(); showGuest(); });
      } else {
        showGuest();
      }
    });
  </script>
</body>
</html>
