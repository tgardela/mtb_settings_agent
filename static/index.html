<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTB Settings Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 680px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    h2 { color: #111; }
    #chat { height: 420px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .bubble { padding: 10px 14px; border-radius: 8px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; }
    .user { background: #0070f3; color: white; align-self: flex-end; }
    .agent { background: #f0f0f0; color: #333; align-self: flex-start; }
    .typing { color: #aaa; font-style: italic; align-self: flex-start; }
    #controls { display: flex; gap: 8px; }
    #input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    #input:focus { border-color: #0070f3; }
    button { padding: 12px 20px; background: #0070f3; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: default; }
    #auth-section { display: flex; flex-direction: column; gap: 12px; }
    #auth-section input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    #auth-section input:focus { border-color: #0070f3; }
    #auth-tabs { display: flex; gap: 8px; }
    #auth-tabs button { flex: 1; background: #eee; color: #333; }
    #auth-tabs button.active { background: #0070f3; color: white; }
    #auth-error { color: #e00; font-size: 14px; display: none; }
    #auth-success { color: #080; font-size: 14px; display: none; }
    #user-bar { display: flex; justify-content: space-between; align-items: center; }
    #logout-btn { padding: 8px 14px; font-size: 13px; background: #eee; color: #333; }
    #logout-btn:hover { background: #ddd; }
    #chat-section { display: none; flex-direction: column; gap: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🤖 MTB Settings Agent</h2>

    <div id="auth-section">
      <div id="auth-tabs">
        <button class="active" onclick="showTab('login')">Login</button>
        <button onclick="showTab('signup')">Sign Up</button>
      </div>
      <div id="login-form">
        <input id="login-email" type="email" placeholder="Email" />
        <input id="login-password" type="password" placeholder="Password" />
        <button onclick="login()">Login</button>
      </div>
      <div id="signup-form" style="display:none; flex-direction:column; gap:8px;">
        <input id="signup-name" type="text" placeholder="Name" />
        <input id="signup-email" type="email" placeholder="Email" />
        <input id="signup-password" type="password" placeholder="Password" />
        <button onclick="signup()">Sign Up</button>
      </div>
      <div id="auth-error"></div>
      <div id="auth-success"></div>
    </div>

    <div id="chat-section">
      <div id="user-bar">
        <span id="user-name"></span>
        <button id="logout-btn" onclick="logout()">Logout</button>
      </div>
      <p>Welcome to the MTB Settings Agent</p>
      <div id="chat"></div>
      <div id="controls">
        <input id="input" type="text" placeholder="Ask anything..." />
        <button id="btn" onclick="send()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("input");
    const btn = document.getElementById("btn");
    const chat = document.getElementById("chat");
    const authSection = document.getElementById("auth-section");
    const chatSection = document.getElementById("chat-section");
    const authError = document.getElementById("auth-error");
    const authSuccess = document.getElementById("auth-success");
    const userNameEl = document.getElementById("user-name");

    function getToken() {
      return localStorage.getItem("token");
    }

    function setToken(token) {
      localStorage.setItem("token", token);
    }

    function clearToken() {
      localStorage.removeItem("token");
      localStorage.removeItem("userName");
    }

    function showAuthSection() {
      authSection.style.display = "flex";
      chatSection.style.display = "none";
    }

    function showChatSection(name) {
      authSection.style.display = "none";
      chatSection.style.display = "flex";
      userNameEl.textContent = "👋 " + name;
    }

    function showTab(tab) {
      document.getElementById("login-form").style.display = tab === "login" ? "flex" : "none";
      document.getElementById("signup-form").style.display = tab === "signup" ? "flex" : "none";
      document.querySelectorAll("#auth-tabs button").forEach((b, i) => {
        b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
      });
      authError.style.display = "none";
      authSuccess.style.display = "none";
    }

    document.getElementById("login-form").style.display = "flex";
    document.getElementById("login-form").style.flexDirection = "column";
    document.getElementById("login-form").style.gap = "8px";

    async function login() {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      authError.style.display = "none";
      authSuccess.style.display = "none";
      const loginBtn = document.querySelector("#login-form button");
      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";
      console.log("[auth] Attempting login for:", email);
      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        console.log("[auth] Login response status:", res.status);
        if (!res.ok) {
          const data = await res.json();
          console.log("[auth] Login error:", data);
          if (res.status === 401) {
            showError("Invalid email or password");
          } else {
            showError(data.detail || "Login failed");
          }
          return;
        }
        const data = await res.json();
        console.log("[auth] Login success");
        setToken(data.access_token);
        await fetchCurrentUser();
      } catch (err) {
        console.error("[auth] Login error:", err);
        showError("Something went wrong, please try again");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    }

    async function signup() {
      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      authError.style.display = "none";
      authSuccess.style.display = "none";
      const signupBtn = document.querySelector("#signup-form button");
      signupBtn.disabled = true;
      signupBtn.textContent = "Creating account...";
      console.log("[auth] Attempting signup for:", email);
      try {
        const res = await fetch("/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });
        console.log("[auth] Signup response status:", res.status);
        if (!res.ok) {
          const data = await res.json();
          console.log("[auth] Signup error:", data);
          if (res.status === 409 || (data.detail && data.detail.toLowerCase().includes("exist"))) {
            showError("This email is already registered");
          } else {
            showError(data.detail || "Signup failed");
          }
          return;
        }
        console.log("[auth] Signup success, logging in...");
        showSuccess("Account created! Logging you in...");
        const loginRes = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        if (!loginRes.ok) {
          const loginData = await loginRes.json();
          console.log("[auth] Auto-login after signup failed:", loginData);
          showError("Account created but login failed. Please log in manually.");
          showTab("login");
          document.getElementById("login-email").value = email;
          return;
        }
        const loginData = await loginRes.json();
        console.log("[auth] Auto-login success");
        setToken(loginData.access_token);
        await fetchCurrentUser();
      } catch (err) {
        console.error("[auth] Signup error:", err);
        showError("Something went wrong, please try again");
      } finally {
        signupBtn.disabled = false;
        signupBtn.textContent = "Sign Up";
      }
    }

    async function fetchCurrentUser() {
      const token = getToken();
      if (!token) { showAuthSection(); return; }
      try {
        const res = await fetch("/auth/me", {
          headers: { "Authorization": "Bearer " + token }
        });
        if (!res.ok) { clearToken(); showAuthSection(); return; }
        const user = await res.json();
        localStorage.setItem("userName", user.name);
        showChatSection(user.name);
        addBubble("Siemandero!", "agent");
      } catch {
        clearToken();
        showAuthSection();
      }
    }

    function logout() {
      clearToken();
      chat.innerHTML = "";
      showAuthSection();
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
      authSuccess.style.display = "none";
    }

    function showSuccess(msg) {
      authSuccess.textContent = msg;
      authSuccess.style.display = "block";
      authError.style.display = "none";
    }

    input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;

      addBubble(msg, "user");
      input.value = "";
      btn.disabled = true;

      const typing = addBubble("Thinking...", "typing");

      try {
        const token = getToken();
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ message: msg })
        });
        if (res.status === 401) {
          typing.remove();
          clearToken();
          showAuthSection();
          return;
        }
        const data = await res.json();
        typing.remove();
        addBubble(data.response, "agent");
      } catch (err) {
        typing.remove();
        addBubble("Error: " + err.message, "agent");
      }

      btn.disabled = false;
      input.focus();
    }

    function addBubble(text, type) {
      const div = document.createElement("div");
      div.className = `bubble ${type}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const token = getToken();
      if (token) {
        fetchCurrentUser();
      } else {
        showAuthSection();
      }
    });
  </script>
</body>
</html>
