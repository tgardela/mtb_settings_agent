name: Run Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic fastapi uvicorn python-dotenv tavily-python pytest ruff

      - name: Run ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v
